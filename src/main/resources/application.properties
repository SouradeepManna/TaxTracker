# ===============================================
# = APPLICATION
# ===============================================
spring.application.name=taxtracker
server.port=8080
server.servlet.context-path=/

# ===============================================
# = DATASOURCE (MySQL running via CMD prompt)
# = Update username/password to match your local MySQL
# ===============================================
spring.datasource.url=jdbc:mysql://localhost:3306/taxtracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=Prajwal@cr17
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================================
# = JPA / HIBERNATE
# ===============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================================
# = SQL INITIALIZATION (run schema.sql + data.sql on startup)
# ===============================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
# Ensure JPA waits for SQL init to finish
spring.jpa.defer-datasource-initialization=false

# ===============================================
# = FILE UPLOAD LIMITS (Form 90C supporting docs - up to 2MB)
# ===============================================
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=5MB

# ===============================================
# = MAIL (Gmail SMTP)
# = TO SEND REAL EMAIL, do TWO things:
# =  1. In your Google Account, enable 2-Step Verification, then create an
# =     "App Password" (Google Account > Security > App passwords). It is a
# =     16-character password. Use it below as spring.mail.password (NOT your
# =     normal Gmail password).
# =  2. Set spring.mail.username and app.mail.from to your Gmail address.
# = If you leave these blank, OTP/confirmation emails are logged to the
# = console instead (set app.mail.enabled=false to force that).
# ===============================================
app.mail.enabled=true
app.mail.from=your-email@gmail.com
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-16-char-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===============================================
# = JWT (simple)
# ===============================================
app.jwt.secret=TaxTrackerSecretKeyForJwtSigningMustBeAtLeast32BytesLong2026
app.jwt.expiration-ms=3600000

# ===============================================
# = SWAGGER / OPENAPI
# ===============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===============================================
# = LOGGING (Log4j2-style levels via default logback; AOP @AfterThrowing logs here)
# ===============================================
logging.level.root=INFO
logging.level.com.taxtracker=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================================
# = EXTERNALIZED EXCEPTION / VALIDATION MESSAGES
# = (read via Environment.getProperty, not hardcoded)
# ===============================================
app.message.user.already.exists=A user with the given email address already exists.
app.message.user.not.found=User not found for the given email.
app.message.invalid.credentials=The email address or password is incorrect.
app.message.unauthorized.access=You are not authorized to access this resource.
app.message.invalid.session=Your session is invalid or has expired. Please log in again.
app.message.transaction.not.found=No transactions found for the given criteria.
app.message.form.not.found=No Form 90C found for the given email.
app.message.form.incomplete=Form data is incomplete.
app.message.otp.not.found=No pending registration found. Please start registration again.
app.message.otp.invalid=The OTP you entered is incorrect.
app.message.otp.expired=The OTP has expired. Please start registration again.
app.message.otp.send.failed=We couldn't send the OTP email. Please check the email address and try again.
app.message.file.invalid.format=Invalid file format. Only PDF and JPG are allowed.
app.message.file.size.exceeded=File size exceeds the 2MB limit.
app.message.file.not.uploaded=Mandatory file not uploaded.
app.message.no.transactions.added=No transactions added.
app.message.invalid.format=Invalid format of type/amount/organizationName.
app.message.export.failed=Failed to export transactions.
app.message.generic.error=Something went wrong. Please try again later.

# = Validation messages (Bean Validation reads from ValidationMessages.properties;
# = these mirror the 'Please provide a valid <attribute>' convention)
app.validation.name.invalid=Name should only contain alphabets with single space between words.
app.validation.email.invalid=Email should be a valid email address with domains like in or com.
app.validation.mobile.invalid=Mobile number should start with 6,7,8 or 9 and be 10 digits.
app.validation.password.invalid=Password must have one uppercase, one lowercase, one digit, one special char and be 7-20 characters.
app.validation.pin.invalid=PIN code should be exactly 6 digits.
